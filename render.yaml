databases:
  - name: breathe-esg-db
    plan: free
    region: ohio

services:
  # ==========================================
  # Django Backend API
  # ==========================================
  - type: web
    name: breathe-esg-backend
    env: python
    plan: free
    region: ohio
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate && python manage.py seed_data && gunicorn breatheESG.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "breathe-esg-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"

  # ==========================================
  # React Frontend Dashboard
  # ==========================================
  - type: web
    name: breathe-esg-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://breathe-esg-backend.onrender.com/api"
      - key: NODE_VERSION
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
